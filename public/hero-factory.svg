<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 800" preserveAspectRatio="xMidYMax slice" role="img" aria-label="نمای صنعتی کارخانه">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e131c"/>
      <stop offset="0.55" stop-color="#141e28"/>
      <stop offset="0.82" stop-color="#1a2c33"/>
      <stop offset="1" stop-color="#20343a"/>
    </linearGradient>
    <radialGradient id="horizonGlow" cx="0.34" cy="0.92" r="0.6">
      <stop offset="0" stop-color="#2f5d66" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2f5d66" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="0.16" cy="0.98" r="0.5">
      <stop offset="0" stop-color="#b98a3c" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#b98a3c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="haze" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#20343a" stop-opacity="0"/>
      <stop offset="1" stop-color="#0e131c" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1440" height="800" fill="url(#sky)"/>
  <rect width="1440" height="800" fill="url(#horizonGlow)"/>
  <rect width="1440" height="800" fill="url(#goldGlow)"/>

  <!-- far skyline silhouette -->
  <g fill="#16232b">
    <rect x="0"   y="520" width="180" height="280"/>
    <rect x="200" y="560" width="120" height="240"/>
    <rect x="1180" y="540" width="160" height="260"/>
    <rect x="1330" y="500" width="110" height="300"/>
  </g>

  <!-- smoke plumes -->
  <g fill="#8fa6ad" opacity="0.10">
    <ellipse cx="470" cy="250" rx="70" ry="34"/>
    <ellipse cx="520" cy="215" rx="90" ry="42"/>
    <ellipse cx="600" cy="180" rx="120" ry="55"/>
    <ellipse cx="915" cy="270" rx="60" ry="30"/>
    <ellipse cx="960" cy="235" rx="85" ry="40"/>
  </g>

  <!-- tall smokestacks with red/white bands -->
  <g>
    <!-- stack 1 -->
    <rect x="452" y="300" width="34" height="360" fill="#243138"/>
    <rect x="452" y="300" width="34" height="26" fill="#b8534a"/>
    <rect x="452" y="352" width="34" height="26" fill="#e7e3da" opacity="0.85"/>
    <rect x="452" y="404" width="34" height="26" fill="#b8534a"/>
    <!-- stack 2 (taller) -->
    <rect x="900" y="330" width="30" height="330" fill="#212d34"/>
    <rect x="900" y="330" width="30" height="24" fill="#b8534a"/>
    <rect x="900" y="378" width="30" height="24" fill="#e7e3da" opacity="0.85"/>
    <rect x="900" y="426" width="30" height="24" fill="#b8534a"/>
    <!-- stack 3 (short, foreground) -->
    <rect x="360" y="430" width="42" height="230" fill="#1c272e"/>
    <rect x="360" y="430" width="42" height="28" fill="#a94c44"/>
    <rect x="360" y="486" width="42" height="28" fill="#dcd8cf" opacity="0.8"/>
  </g>

  <!-- main factory blocks (mid) -->
  <g fill="#18242b">
    <rect x="520" y="470" width="230" height="190"/>
    <rect x="760" y="500" width="150" height="160"/>
    <rect x="940" y="460" width="210" height="200"/>
  </g>

  <!-- sawtooth roof on a factory hall -->
  <g fill="#20303a">
    <polygon points="520,470 560,440 560,470"/>
    <polygon points="570,470 610,440 610,470"/>
    <polygon points="620,470 660,440 660,470"/>
    <polygon points="670,470 710,440 710,470"/>
    <polygon points="720,470 750,447 750,470"/>
  </g>

  <!-- gantry / pipe rack across -->
  <g stroke="#26363d" stroke-width="6" fill="none" opacity="0.9">
    <line x1="402" y1="560" x2="900" y2="560"/>
    <line x1="900" y1="560" x2="1180" y2="575"/>
  </g>
  <g fill="#26363d">
    <rect x="486" y="560" width="8" height="100"/>
    <rect x="700" y="560" width="8" height="100"/>
    <rect x="880" y="560" width="8" height="100"/>
    <rect x="1080" y="575" width="8" height="85"/>
  </g>

  <!-- window rows (dim warm lights) -->
  <g fill="#c8974a" opacity="0.5">
    <rect x="545" y="520" width="10" height="14"/>
    <rect x="565" y="520" width="10" height="14"/>
    <rect x="585" y="520" width="10" height="14"/>
    <rect x="965" y="510" width="10" height="14"/>
    <rect x="985" y="510" width="10" height="14"/>
    <rect x="1005" y="510" width="10" height="14"/>
    <rect x="1025" y="510" width="10" height="14"/>
  </g>

  <!-- foreground haze to blend into overlay -->
  <rect x="0" y="420" width="1440" height="380" fill="url(#haze)"/>
</svg>
